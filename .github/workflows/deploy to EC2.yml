name: Deploy to EC2 (Ubuntu + Nginx)

on:
  push:
    branches:
    - main
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup SSH Key
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.EC2_SSH_KEY }}" > ~/.ssh/ec2_key.pem
          chmod 600 ~/.ssh/ec2_key.pem

      - name: Add EC2 Host to known_hosts
        run: |
          ssh-keyscan -H ${{ secrets.EC2_HOST }} >> ~/.ssh/known_hosts

      - name: Deploy client to EC2 nginx root
        run: |
          scp -i ~/.ssh/ec2_key.pem -r client ubuntu@${{ secrets.EC2_HOST }}:/tmp/client

          ssh -i ~/.ssh/ec2_key.pem ubuntu@${{ secrets.EC2_HOST }} "
          sudo rm -rf /var/www/html/client &&
          sudo cp -r /tmp/client /var/www/html/client &&
          sudo rm -rf /tmp/client &&
          sudo systemctl restart nginx"
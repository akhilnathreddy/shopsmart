name: CI Pipeline

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  # ─────────────────────────────────────────────
  # Client — Unit Tests (+ Lint) 
  # ─────────────────────────────────────────────
  client-unit:
    name: Client Unit Tests
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: client

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'
          cache-dependency-path: client/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Run linter
        run: npm run lint

      - name: Run unit tests and generate report
        run: npx vitest run --exclude 'src/__test__/**' --reporter=default --reporter=junit --outputFile.junit=test-results/unit-junit.xml

      - name: Upload unit test report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: client-unit-test-report
          path: client/test-results/unit-junit.xml
          retention-days: 14

  # ─────────────────────────────────────────────
  # Client — Integration Tests
  # ─────────────────────────────────────────────
  client-integration:
    name: Client Integration Tests
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: client

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'
          cache-dependency-path: client/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Run integration tests and generate report
        run: npx vitest run --dir src/__test__ --reporter=default --reporter=junit --outputFile.junit=test-results/integration-junit.xml

      - name: Upload integration test report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: client-integration-test-report
          path: client/test-results/integration-junit.xml
          retention-days: 14

  # ─────────────────────────────────────────────
  # Client — E2E Tests (Playwright)
  # ─────────────────────────────────────────────
  client-e2e:
    name: Client E2E Tests
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: client

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'
          cache-dependency-path: client/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: Run E2E tests
        run: npm run test:e2e

      - name: Upload Playwright report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: playwright-report
          path: client/playwright-report/
          retention-days: 14

  # ─────────────────────────────────────────────
  # Client — Build Verification
  # ─────────────────────────────────────────────
  client-build:
    name: Client Build
    runs-on: ubuntu-latest
    needs: [client-unit, client-integration]

    defaults:
      run:
        working-directory: client

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'
          cache-dependency-path: client/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Build production bundle
        run: npm run build

  # ─────────────────────────────────────────────
  # Server CI
  # ─────────────────────────────────────────────
  server-ci:
    name: Server CI
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: server

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'
          cache-dependency-path: server/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Install jest-junit reporter
        run: npm install --save-dev jest-junit

      - name: Run linter
        run: npm run lint

      - name: Run tests and generate report
        run: |
          npx jest --testPathIgnorePatterns=tests/integration --reporters=default --reporters=jest-junit
        env:
          JEST_JUNIT_OUTPUT_DIR: test-results
          JEST_JUNIT_OUTPUT_NAME: unit-junit.xml

      - name: Upload unit test report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: server-unit-test-report
          path: server/test-results/unit-junit.xml
          retention-days: 14

  # ─────────────────────────────────────────────
  # Server — Integration Tests (real HTTP)
  # ─────────────────────────────────────────────
  server-integration:
    name: Server Integration Tests
    runs-on: ubuntu-latest
    needs: [server-ci]

    defaults:
      run:
        working-directory: server

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'
          cache-dependency-path: server/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Install jest-junit reporter
        run: npm install --save-dev jest-junit

      - name: Run integration tests and generate report
        run: |
          npx jest tests/integration --reporters=default --reporters=jest-junit --forceExit
        env:
          JEST_JUNIT_OUTPUT_DIR: test-results
          JEST_JUNIT_OUTPUT_NAME: integration-junit.xml

      - name: Upload integration test report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: server-integration-test-report
          path: server/test-results/integration-junit.xml
          retention-days: 14